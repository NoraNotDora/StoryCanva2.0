<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>故事详情</title>
    <link href="{{ url_for('static', filename='css/detail.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="{{ url_for('index') }}" class="back-btn">← 返回列表</a>
        <article id="postDetail">
            <h2 class="post-title"></h2>
            <p class="post-section"></p>
            <div class="post-content"></div>
            {% if post.image %}
            <img src="{{ url_for('static', filename='uploads/' + post.image) }}" class="detail-image" alt="插图">
            {% endif %}
            <div class="post-meta">
                <span class="likes" style="cursor:pointer;">
                    ❤ <span id="likeCount">0</span>
                </span>
                <span class="post-time"></span>
            </div>
            
            <div class="comments-section">
                <h3>评论（<span id="commentCount">0</span>）</h3>
                <div class="comments-list"></div>
                <div class="comment-form">
                    <textarea id="commentInput" placeholder="写下你的评论..."></textarea>
                    <button onclick="submitComment()">发布评论</button>
                </div>
            </div>
        </article>
    </div>
    <script src="{{ url_for('static', filename='js/detail.js') }}"></script>
</body>
</html>

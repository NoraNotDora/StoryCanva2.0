<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>{% block title %}StoryCanva{% endblock %}</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- 统一CSS样式 -->
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="{{ url_for('static', filename='css/css2.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/all.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/bootstrap-icons.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/animate.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/owl.carousel.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="container-fluid bg-white p-0">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg bg-white navbar-light sticky-top px-4 px-lg-5 py-lg-0" style="top: -100px;">
            <a href="#" class="navbar-brand">
                <h1 class="m-0 text-primary"><i class="fa fa-book-reader me-3"></i>StoryCanva</h1>
            </a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <div class="navbar-nav mx-auto">
                    <a href="{{ url_for('index') }}" class="nav-item nav-link">Home</a>
                    <a href="{{ url_for('create') }}" class="nav-item nav-link">Create</a>
                    <a href="{{ url_for('achievement') }}" class="nav-item nav-link">Achievements</a>
                    <a href="{{ url_for('community') }}" class="nav-item nav-link">Community</a>
                </div>
                <a href="{{ url_for('login') }}" class="btn btn-primary rounded-pill px-3 d-none d-lg-block">Login<i
                        class="fa fa-arrow-right ms-3"></i></a>
            </div>
        </nav>

        <!-- 内容区块 -->
        {% block content %}
        <!-- 测试内容 -->
        <div class="container py-5 text-center">
            <h1>基础模板测试页面</h1>
            <p>这是一个基础模板的测试视图</p>
            <!-- 添加静态资源测试 -->
            <img src="{{ url_for('static', filename='picture/classes-1.jpg') }}" 
                 class="img-fluid rounded" 
                 style="max-width: 300px;"
                 alt="测试图片">
        </div>
        {% endblock %}

        <!-- 底部 -->
        <div class="container-fluid bg-dark text-white-50 footer pt-5 mt-5 wow fadeIn" data-wow-delay="0.1s">
            <div class="container py-5">
                <div class="row g-5">
                    <div class="col-lg-12 col-md-12">
                        <div class="text-center">
                            <h3 class="text-white mb-4">Contact Us</h3>
                            <p class="mb-2"><i class="fa fa-map-marker-alt me-3"></i>South China Normal University</p>
                            <p class="mb-2"><i class="fa fa-envelope me-3"></i>caihuali@m.scnu.edu.cn</p>
                            <div class="d-flex pt-2 justify-content-center">
                                <a class="btn btn-outline-light btn-social" href="#"><i class="fab fa-weibo"></i></a>
                                <a class="btn btn-outline-light btn-social" href="#"><i class="fab fa-weixin"></i></a>
                                <a class="btn btn-outline-light btn-social" href="#"><i class="fab fa-qq"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 统一JS脚本 -->
    <script src="{{ url_for('static', filename='js/jquery-3.4.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/wow.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/easing.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/waypoints.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/owl.carousel.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>

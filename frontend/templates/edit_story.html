{% extends "base.html" %}

{% block title %}编辑故事 - StoryCanva{% endblock %}

{% block content %}
<div class="container-xxl py-5">
	<div class="text-center mx-auto mb-5 wow fadeInUp" data-wow-delay="0.1s">
		<h1 class="mb-3">编辑故事</h1>
		<p>修改您的故事内容</p>
	</div>
	
	<div class="row g-4">
		<div class="col-12 wow fadeInUp" data-wow-delay="0.3s">
			<form id="edit-form" class="bg-light rounded p-5" action="{{ url_for('edit_story', story_id=story.id) }}" method="post" enctype="multipart/form-data">
				<div class="row g-3">
					<div class="col-12">
						<div class="form-floating">
							<input type="text" class="form-control border-0" id="title" name="title" placeholder="故事标题" value="{{ story.title }}">
							<label for="title">故事标题</label>
						</div>
					</div>
					<div class="col-12">
						<div class="form-floating">
							<textarea class="form-control border-0" id="content" name="content" placeholder="故事内容" style="height: 300px">{{ story.content }}</textarea>
							<label for="content">故事内容</label>
						</div>
					</div>
					<div class="col-12">
						<label for="story-image" class="form-label">故事插图 (可选)</label>
						<input class="form-control" type="file" id="story-image" name="image" accept="image/*">
						<div class="mt-2">
							{% if story.image_path %}
							<p>当前图片:</p>
							<img id="current-image" src="{{ url_for('static', filename=story.image_path) }}" alt="当前图片" style="max-width: 100%; max-height: 300px;">
							<p class="text-muted">上传新图片将替换当前图片</p>
							{% endif %}
							<img id="image-preview" src="#" alt="图片预览" style="max-width: 100%; max-height: 300px; display: none;">
						</div>
					</div>
					<div class="col-12">
						<div class="form-check">
							<input class="form-check-input" type="checkbox" id="is-public" name="is_public" value="1" {% if story.is_public == 1 %}checked{% endif %}>
							<label class="form-check-label" for="is-public">
								公开到社区（其他用户可以看到您的故事）
							</label>
						</div>
					</div>
					<div class="col-12">
						<button class="btn btn-primary w-100 py-3" type="submit">更新故事</button>
					</div>
				</div>
			</form>
		</div>
	</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const imageInput = document.getElementById('story-image');
    const imagePreview = document.getElementById('image-preview');
    const currentImage = document.getElementById('current-image');
    
    // 图片预览功能
    if (imageInput) {
        imageInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    if (currentImage) {
                        currentImage.style.display = 'none';
                    }
                }
                
                reader.readAsDataURL(this.files[0]);
            } else {
                imagePreview.style.display = 'none';
                if (currentImage) {
                    currentImage.style.display = 'block';
                }
            }
        });
    }
});
</script>
{% endblock %}
